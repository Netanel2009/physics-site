<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysicsMaster | מערכת למידה מתקדמת</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="loading-screen">
    <div id="particles"></div>
    <div class="loader-content">
        <i class="fa-solid fa-atom"></i>
        <h1 id="typing-logo"></h1>
    </div>
</div>

    <nav class="navbar">

    <!-- צד ימין: לוגו + גביע -->
    <!-- צד ימין -->
<div style="display:flex; align-items:center;">

    <!-- לוגו -->
    <div class="logo" onclick="router('home')" style="cursor:pointer;">
        <i class="fa-solid fa-atom fa-spin"></i>
        <span>PhysicsMaster</span>
    </div>
</div>


    <!-- אמצע: ניווט -->
    <div class="nav-links">
        <span onclick="scrollToSection('learning')">מרכז למידה</span>
        <span onclick="scrollToSection('about')">אודות</span>
        <span onclick="scrollToSection('testimonials')">תגובות</span>
        <span onclick="scrollToSection('contact')">צור קשר</span>
        <span onclick="router('admin')" style="font-size:0.9rem; opacity:0.7;">
            <i class="fa-solid fa-user-shield"></i>
        </span>
    </div>


    <!-- צד שמאל: פרופיל + XP (לא נוגעים בזה) -->
    <div id="auth-section">

        <button id="login-trigger-btn"
            class="btn-main"
            onclick="document.getElementById('auth-modal').style.display='flex'">
            התחברות
        </button>

        <div id="user-profile" class="user-profile" style="display:none;">
            <img id="user-photo"
                src="https://ui-avatars.com/api/?name=User&background=random"
                alt="Profile">

            <div class="profile-dropdown">
                <p id="user-name-display">שם משתמש</p>
                <hr>
                <span onclick="handleLogout()">
                    התנתק <i class="fa-solid fa-right-from-bracket"></i>
                </span>
            </div>
        </div>

        <div id="level-widget" class="level-widget" style="display:none;">
            <div class="level-circle">
                <span id="current-level">1</span>
            </div>

            <div class="xp-container">
                <div class="xp-bar-bg">
                    <div class="xp-bar-fill" id="xp-bar"></div>
                </div>
                <span class="xp-text">
                    <span id="current-xp">0</span> /
                    <span id="xp-needed">100</span>
                </span>
            </div>
        </div>

    </div>

</nav>

    <main id="app-container"></main>

    <footer>
        <p>© 2026 PhysicsMaster - כל הזכויות שמורות.</p>
    </footer>

    <div id="auth-modal" class="auth-overlay" style="display: none;">
        <div class="auth-card">
            <button onclick="document.getElementById('auth-modal').style.display='none'" style="position:absolute; top:10px; left:10px; background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            
            <div class="auth-tabs">
                <button id="tab-login" class="active" onclick="switchTab('login')">כניסה</button>
                <button id="tab-signup" onclick="switchTab('signup')">הרשמה</button>
            </div>

            <form id="auth-form">
                <h2 id="auth-title">ברוכים הבאים</h2>
                <p id="auth-subtitle" style="margin-bottom: 20px;">התחברו כדי להתחיל ללמוד פיזיקה</p>
                
                <div id="name-field" style="display: none;">
                    <input type="text" id="auth-name" placeholder="שם מלא">
                </div>
                
                <input type="email" id="auth-email" placeholder="אימייל" required>
                <input type="password" id="auth-pass" placeholder="סיסמה (לפחות 6 תווים)" required>
                
                <button type="submit" id="auth-submit" class="btn-main" style="width: 100%; margin-top: 15px;">המשך</button>
                <p id="auth-error" style="color: #ef4444; margin-top: 10px; font-size: 0.9rem; font-weight: bold;"></p>
            </form>
        </div>
    </div>

    <!-- AI Chat Widget -->
    <div id="ai-chat-box">
        <div style="padding:10px; background:#3b82f6; color:white; text-align:center;">
            צ'אט שאלות 🤖
            <button onclick="toggleChat()" style="float:left; background:none; border:none; color:white; font-size:18px;">✖</button>
        </div>

        <div id="chat-messages" style="flex:1; padding:10px; overflow-y:auto;"></div>

        <div style="display:flex; border-top:1px solid #eee;">
        </div>
    </div>

    <button onclick="toggleChat()"
        style="position:fixed; bottom:20px; right:20px;
            width:60px; height:60px; border-radius:50%;
            background:#3b82f6; color:white; border:none;
            font-size:24px; box-shadow:0 10px 25px rgba(0,0,0,0.3);">
        🤖
    </button>
    <!-- Leaderboard Sidebar -->
    <div id="leaderboard-sidebar">
        <h3>🏆 טופ 5</h3>
        <div id="leaderboard-list"></div>
    </div>
    <!-- Achievements Button -->
    <button id="achievements-btn" onclick="toggleAchievements()">
        🏆
    </button>
    <!-- Achievements Modal -->
    <div id="achievements-modal" class="achievements-overlay">
        <div class="achievements-card">
            <h2>🏆 הישגים</h2>
            <div id="achievements-list"></div>
            <button class="btn-back" onclick="toggleAchievements()">סגור</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>

    
</body>
</html>
